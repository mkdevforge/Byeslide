<section class="slide">
  <div class="slide__topline">
    <span class="eyebrow">Chart.js</span>
    <div class="caption">Parameterized equation</div>
  </div>
  <div class="chartjs-layout chartjs-layout--equation">
    <div class="chartjs-panel chartjs-panel--main">
      <div class="chartjs-panel__header">
        <div>
          <h2 class="heading">Change parameters live</h2>
          <p>Use an equation and range inputs to drive one or more Chart.js charts.</p>
        </div>
      </div>
      <div class="chartjs-equation-charts">
        <div class="chartjs-canvas-wrap chartjs-canvas-wrap--model">
          <canvas data-chartjs-logistic aria-label="Logistic growth curve"></canvas>
        </div>
        <div class="chartjs-canvas-wrap chartjs-canvas-wrap--velocity">
          <canvas data-chartjs-velocity aria-label="Logistic growth velocity curve"></canvas>
        </div>
      </div>
    </div>
    <div class="chartjs-panel chartjs-panel--control">
      <h3>Logistic growth</h3>
      <div class="chartjs-equation">
        <span>P(t) =</span>
        <strong><span data-equation-k>100</span> / (1 + e<sup>-<span data-equation-r>0.80</span>(t - <span data-equation-t0>5.0</span>)</sup>)</strong>
      </div>
      <div class="chartjs-parameter-list">
        <label>
          <span>Ceiling K</span>
          <input type="range" min="60" max="140" value="100" step="5" data-parameter="ceiling">
          <strong data-parameter-value="ceiling">100</strong>
        </label>
        <label>
          <span>Growth rate r</span>
          <input type="range" min="0.25" max="1.45" value="0.8" step="0.05" data-parameter="rate">
          <strong data-parameter-value="rate">0.80</strong>
        </label>
        <label>
          <span>Inflection t0</span>
          <input type="range" min="2.0" max="8.0" value="5.0" step="0.25" data-parameter="inflection">
          <strong data-parameter-value="inflection">5.0</strong>
        </label>
      </div>
    </div>
  </div>
  <script src="./assets/vendor/chart.umd.js"></script>
  <script>
    (() => {
      const slide = window.Byeslide?.slideForScript(document.currentScript);
      const logisticCanvas = slide?.querySelector("[data-chartjs-logistic]");
      const velocityCanvas = slide?.querySelector("[data-chartjs-velocity]");
      if (!slide || !logisticCanvas || !velocityCanvas || !window.Chart || logisticCanvas.dataset.chartReady === "true") {
        return;
      }

      logisticCanvas.dataset.chartReady = "true";
      velocityCanvas.dataset.chartReady = "true";
      const controls = {
        ceiling: slide.querySelector("[data-parameter='ceiling']"),
        rate: slide.querySelector("[data-parameter='rate']"),
        inflection: slide.querySelector("[data-parameter='inflection']")
      };
      const values = {
        ceiling: slide.querySelector("[data-parameter-value='ceiling']"),
        rate: slide.querySelector("[data-parameter-value='rate']"),
        inflection: slide.querySelector("[data-parameter-value='inflection']")
      };
      const equation = {
        ceiling: slide.querySelector("[data-equation-k]"),
        rate: slide.querySelector("[data-equation-r]"),
        inflection: slide.querySelector("[data-equation-t0]")
      };
      const logisticChart = new Chart(logisticCanvas, {
        type: "line",
        data: {
          datasets: [{
            label: "P(t)",
            data: [],
            backgroundColor: "rgba(89, 131, 146, 0.18)",
            borderColor: "#01161e",
            borderWidth: 5,
            fill: true,
            pointRadius: 0,
            tension: 0.34
          }]
        },
        options: {
          maintainAspectRatio: false,
          parsing: false,
          responsive: true,
          scales: {
            x: { type: "linear" },
            y: { type: "linear" }
          }
        }
      });
      const velocityChart = new Chart(velocityCanvas, {
        type: "line",
        data: {
          datasets: [{
            label: "dP/dt",
            data: [],
            backgroundColor: "rgba(174, 195, 176, 0.22)",
            borderColor: "#598392",
            borderWidth: 4,
            fill: true,
            pointRadius: 0,
            tension: 0.34
          }]
        },
        options: {
          maintainAspectRatio: false,
          parsing: false,
          responsive: true,
          scales: {
            x: { type: "linear" },
            y: { type: "linear" }
          }
        }
      });

      const update = () => {
        const ceiling = Number(controls.ceiling.value);
        const rate = Number(controls.rate.value);
        const inflection = Number(controls.inflection.value);
        values.ceiling.textContent = ceiling.toFixed(0);
        values.rate.textContent = rate.toFixed(2);
        values.inflection.textContent = inflection.toFixed(1);
        equation.ceiling.textContent = ceiling.toFixed(0);
        equation.rate.textContent = rate.toFixed(2);
        equation.inflection.textContent = inflection.toFixed(1);
        const samples = Array.from({ length: 100 }, (_, index) => {
          const t = index / 10;
          const p = ceiling / (1 + Math.exp(-rate * (t - inflection)));
          return { t, p, velocity: rate * p * (1 - p / ceiling) };
        });
        logisticChart.data.datasets[0].data = samples.map(({ t, p }) => ({ x: t, y: p }));
        velocityChart.data.datasets[0].data = samples.map(({ t, velocity }) => ({ x: t, y: velocity }));
        logisticChart.update();
        velocityChart.update();
      };

      Object.values(controls).forEach((control) => control.addEventListener("input", update));
      update();
    })();
  </script>
  <aside class="notes">Replace the equation, controls, and sample function with the model for your talk.</aside>
</section>
